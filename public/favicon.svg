
  
<svg  xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark background circle -->
  <circle  cx="50" cy="50" r="50" fill="#1f2937"/>

  <!-- Notepad body -->
  <rect x="25" y="20" width="45" height="55" rx="4" ry="4" fill="#374151" stroke="#2563eb" stroke-width="3"/>

  <!-- Notepad lines -->
  <line x1="33" y1="38" x2="62" y2="38" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="33" y1="48" x2="62" y2="48" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="33" y1="58" x2="50" y2="58" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Notepad top binding -->
  <rect x="38" y="15" width="24" height="10" rx="3" ry="3" fill="#2563eb"/>

  <!-- Pencil body -->
  <rect x="58" y="55" width="8" height="25" rx="1" ry="1" fill="#fbbf24" transform="rotate(-45 62 67)"/>

  <!-- Pencil tip -->
  <polygon points="72,78 78,72 75,75" fill="#f87171"/>

  <!-- Checkmark on first line -->
  <polyline  points="33,33 36,37 42,30" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>




